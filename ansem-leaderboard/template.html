<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ANSEM Daily Top 20</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0B1A;
    --panel: #141126;
    --line: #262040;
    --text: #EDEBFF;
    --dim: #8B84B0;
    --sol-a: #9945FF;
    --sol-b: #14F195;
    --gold: #FFC94A;
    --silver: #C9CDDB;
    --bronze: #D08B5B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 20px; }

  header { padding: 56px 0 28px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--dim); text-transform: uppercase; }
  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 52px);
    line-height: 1.05;
    margin: 10px 0 6px;
  }
  h1 .ticker {
    background: linear-gradient(90deg, var(--sol-a), var(--sol-b));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .board-date {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--dim);
    margin-bottom: 16px;
  }
  .meta { font-size: 12px; color: var(--dim); display: flex; gap: 24px; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }

  .row {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 14px;
    padding: 16px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel);
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
  }
  a.row:hover { border-color: var(--sol-a); }

  .rank {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700; font-size: 15px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 2px; color: var(--dim);
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }

  .who { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .handle { font-weight: 600; font-size: 14px; }
  .name { color: var(--dim); font-size: 12px; }
  .snippet { font-size: 13px; line-height: 1.55; color: var(--text); opacity: 0.9; margin-bottom: 12px; overflow-wrap: anywhere; }

  .bar-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--sol-a), var(--sol-b)); }

  .stats { display: flex; gap: 18px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .stats b { color: var(--text); font-weight: 600; }
  .impr b { color: var(--sol-b); }

  .empty { padding: 40px 20px; text-align: center; color: var(--dim); font-size: 13px; border: 1px dashed var(--line); border-radius: 12px; }

  footer { margin-top: 40px; font-size: 11px; color: var(--dim); line-height: 1.7; }

  @media (prefers-reduced-motion: no-preference) {
    .bar-fill { transform-origin: left; animation: grow 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
    @keyframes grow { from { transform: scaleX(0); } }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Daily Bagwork Leaderboard · Ranked by Impressions</div>
    <h1><span class="ticker">$ANSEM</span> DAILY TOP 20</h1>
    <div class="board-date" id="m-date"></div>
    <div class="meta">
      <span>Last scan: <b id="m-updated"></b></span>
      <span>Window: <b>last 24 hours</b></span>
    </div>
  </header>

  <main id="board"></main>

  <footer>
    The most-viewed $ANSEM posts of the last 24 hours. Impressions are X's own view
    counts (public_metrics). Updated nightly.
  </footer>
</div>

<script>
/*__DATA__*/

const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M'
             : n >= 1e3 ? (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K'
             : String(n);
const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const scanDate = new Date(DATA.generated);
document.getElementById('m-date').textContent = scanDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
document.getElementById('m-updated').textContent = scanDate.toLocaleString();

function rankClass(i) { return i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : ''; }

const list = DATA.today || [];
document.getElementById('board').innerHTML = !list.length
  ? '<div class="empty">No posts captured in this window yet — check back after the next scan.</div>'
  : (() => {
      const max = Math.max(...list.map(p => p.impressions), 1);
      return list.map((p, i) => `
        <a class="row" href="https://x.com/${esc(p.username)}/status/${esc(p.id)}" target="_blank" rel="noopener">
          <div class="rank ${rankClass(i)}">${String(i+1).padStart(2,'0')}</div>
          <div>
            <div class="who"><span class="handle">@${esc(p.username)}</span><span class="name">${esc(p.name)}</span></div>
            <div class="snippet">${esc(p.text.length > 180 ? p.text.slice(0,180) + '…' : p.text)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max(p.impressions/max*100, 1.5)}%"></div></div>
            <div class="stats">
              <span class="impr"><b>${fmt(p.impressions)}</b> views</span>
              <span><b>${fmt(p.likes)}</b> likes</span>
              <span><b>${fmt(p.retweets)}</b> reposts</span>
              <span><b>${fmt(p.replies)}</b> replies</span>
            </div>
          </div>
        </a>`).join('');
    })();
</script>
</body>
</html>
