  * { margin: 0; padding: 0; box-sizing: border-box; }

  h1 .ticker {

    background-clip: text;
    color: transparent;
  }
  .board-date {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--dim);
    margin-bottom: 16px;
  }
  .meta { font-size: 12px; color: var(--dim); display: flex; gap: 24px; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }

  .row {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 14px;
    padding: 16px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel);
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
  }
  a.row:hover { border-color: var(--sol-a); }

  .rank {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700; font-size: 15px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 2px; color: var(--dim);
  }
  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: var(--silver); }
  .rank.r3 { color: var(--bronze); }

  .who { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .handle { font-weight: 600; font-size: 14px; }
  .name { color: var(--dim); font-size: 12px; }
  .snippet { font-size: 13px; line-height: 1.55; color: var(--text); opacity: 0.9; margin-bottom: 12px; overflow-wrap: anywhere; }

  .bar-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--sol-a), var(--sol-b)); }

  .stats { display: flex; gap: 18px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .stats b { color: var(--text); font-weight: 600; }
  .impr b { color: var(--sol-b); }

  .empty { padding: 40px 20px; text-align: center; color: var(--dim); font-size: 13px; border: 1px dashed var(--line); border-radius: 12px; }

  footer { margin-top: 40px; font-size: 11px; color: var(--dim); line-height: 1.7; }

  @media (prefers-reduced-motion: no-preference) {
    .bar-fill { transform-origin: left; animation: grow 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
    @keyframes grow { from { transform: scaleX(0); } }
  }
</style>
