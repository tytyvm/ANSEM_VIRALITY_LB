  .handle { font-weight: 600; font-size: 14px; }
  .name { color: var(--dim); font-size: 12px; }
  .snippet { font-size: 13px; line-height: 1.55; color: var(--text); opacity: 0.9; margin-bottom: 12px; overflow-wrap: anywhere; }

  .bar-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--sol-a), var(--sol-b)); }

  .stats { display: flex; gap: 18px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .stats b { color: var(--text); font-weight: 600; }
  .impr b { color: var(--sol-b); }

  .empty { padding: 40px 20px; text-align: center; color: var(--dim); font-size: 13px; border: 1px dashed var(--line); border-radius: 12px; }
