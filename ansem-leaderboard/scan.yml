name: Scan $ANSEM

# Runs the scanner in the cloud. Two ways it triggers:
#   1. On a schedule (daily) — keeps the leaderboard fresh automatically.
#   2. Manually — click "Run workflow" in the Actions tab whenever you want.
on:
  schedule:
    - cron: '0 13 * * *'      # every day at 13:00 UTC (~9am ET). Change if you like.
  workflow_dispatch:
    inputs:
      pages:
        description: 'How many pages to scan (100 posts each, ~$0.50/page)'
        required: false
        default: '3'

permissions:
  contents: write              # lets the action save results back to your repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the scanner
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: node scanner.js --pages=${{ github.event.inputs.pages || '3' }}

      - name: Save results back to the repo
        run: |
          git config user.name "ansem-bot"
          git config user.email "actions@github.com"
          git add index.html data.json
          git commit -m "Update leaderboard $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing changed"
          git push
