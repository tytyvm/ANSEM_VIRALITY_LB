name: Scan $ANSEM

# Runs the daily scanner in the cloud. Two ways it triggers:
#   1. On a schedule — every night at 11:30 PM ET, so the "Today" board
#      captures a full day before you post it.
#   2. Manually — click "Run workflow" in the Actions tab anytime.
on:
  schedule:
    - cron: '30 3 * * *'      # 03:30 UTC = 11:30 PM ET daily
  workflow_dispatch:
    inputs:
      pages:
        description: 'Max pages for the daily crawl (100 posts each, ~$0.50/page — early-stop usually spends less)'
        required: false
        default: '3'

permissions:
  contents: write              # lets the action save results back to your repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run the scanner
        working-directory: ansem-leaderboard
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: node scanner.js --pages=${{ github.event.inputs.pages || '3' }}

      - name: Save results back to the repo
        run: |
          git config user.name "ansem-bot"
          git config user.email "actions@github.com"
          git add ansem-leaderboard/index.html ansem-leaderboard/data.json
          git commit -m "Daily leaderboard $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing changed"
          git push